<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>明日方舟杯级榜</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 头部与搜索 -->
        <header class="header">
            <div class="header-title">
                <h1>杯级榜</h1>
            </div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="搜索干员 / 杯级..." autocomplete="off"/>
            </div>
            <!-- Tab 切换 -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="manual">决战榜</button>
                <button class="tab-btn" data-tab="auto">挂机榜</button>
                <button class="tab-btn" data-tab="total">总杯榜</button>
            </div>
        </header>

        <!-- 列表容器 -->
        <main class="list-container" id="list-container">
            <!-- 卡片由 JS 动态渲染 -->
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
