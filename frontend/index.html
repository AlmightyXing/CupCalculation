<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杯级计算器</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js" defer></script>
</head>
<body>
  
  <div id="app-container">
    
    <!-- Top Navigation / Header -->
    <header class="glass-panel main-header">
      <div class="header-top">
        <img src="image/Text_Title.png" alt="杯级计算器" class="logo">
      </div>
      
      <div class="search-bar" id="search-bar-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <span>搜索干员名或外号(如42)</span>
      </div>

      <nav class="nav-tabs" id="main-nav">
        <button class="nav-btn active" data-view="total" title="总杯榜">
          <img src="image/Navi_Bar_Cup.png" alt="总杯榜">
        </button>
        <button class="nav-btn" data-view="idle" title="挂机榜">
          <img src="image/Navi_Bar_Auto.png" alt="挂机榜">
        </button>
        <button class="nav-btn" data-view="burst" title="决战榜">
          <img src="image/Navi_Bar_Manual.png" alt="决战榜">
        </button>
        <button class="nav-btn" data-view="sandbox" title="沙盒模拟">
          <img src="image/Navi_Bar_Sandbox.png" alt="沙盒模拟">
        </button>
      </nav>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="fade-in">
      
      <!-- Leaderboard View -->
      <section id="view-leaderboard" class="view-section active">
        <div class="table-header-bar glass-panel">
          <h2 id="leaderboard-title">总杯榜</h2>
          <div class="enemy-selector">
            <select id="enemy-select">
              <option value="0" selected>0甲 0抗</option>
              <option value="1">1000甲 20抗</option>
              <option value="2">2000甲 40抗</option>
              <option value="3">3000甲 60抗</option>
              <option value="4">4000甲 80抗</option>
              <option value="5">5000甲 100抗</option>
            </select>
          </div>
        </div>

        <div class="table-columns">
          <!-- Dynamically populated headers -->
        </div>

        <div id="operator-list" class="operator-list">
          <!-- Operator Cards go here -->
          <div class="loading-state">加载中...</div>
        </div>
      </section>

      <!-- Sandbox View -->
      <section id="view-sandbox" class="view-section fade-in" style="display: none;">
        <h2>战斗环境模拟 (Sandbox)</h2>
        <div class="sandbox-form">
          <div class="form-group">
            <label>干员名称 (如: 维什戴尔)</label>
            <input type="text" id="sb-op-name" placeholder="请输入干员名">
          </div>
          <div class="form-group">
            <label>技能序号 (0, 1, 2)</label>
            <input type="number" id="sb-skill-idx" value="0">
          </div>
          <div class="form-group">
            <label>敌人护甲 (DEF)</label>
            <input type="number" id="sb-def" value="1000">
          </div>
          <div class="form-group">
            <label>敌人法抗 (RES)</label>
            <input type="number" id="sb-res" value="20">
          </div>
          <button class="btn btn-primary" id="sb-submit">开始演算</button>
        </div>
        <div id="sandbox-result"></div>
      </section>

      <!-- Detail View -->
      <section id="view-detail" class="view-section fade-in" style="display: none;">
        <button class="btn" id="detail-back-btn" style="margin-bottom: 20px;">&larr; 返回</button>
        <div id="detail-content"></div>
      </section>

      <!-- Search View -->
      <section id="view-search" class="view-section fade-in" style="display: none;">
        <button class="btn" id="search-back-btn" style="margin-bottom: 20px;">&larr; 返回</button>
        <div class="search-input-container">
          <input type="text" id="search-input" placeholder="输入干员名称或外号...">
          <button class="btn btn-primary" id="search-btn">搜索</button>
        </div>
        <div id="search-results" class="operator-list" style="margin-top:20px;"></div>
      </section>

    </main>
  </div>

</body>
</html>
